model = "gpt-5.4"
model_reasoning_effort = "medium"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
personality = "pragmatic"
plan_mode_reasoning_effort = "high"

[features]
unified_exec = true
shell_snapshot = true
ghost_commit = false
skills = true
apps = true
personality = true
multi_agent = true

[mcp_servers.context7]
