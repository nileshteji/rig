model = "gpt-5.4"
model_reasoning_effort = "medium"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
personality = "pragmatic"
plan_mode_reasoning_effort = "high"

[features]
unified_exec = true
shell_snapshot = true
ghost_commit = false
skills = true
apps = true
personality = true
multi_agent = true

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = ""

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.task-master-ai]
command = "npx"
args = ["-y", "task-master-ai"]


[mcp_servers.gws]
command = "gws"
args = ["mcp", "-s", "all"]

[mcp_servers.task-master-ai.env]
TASK_MASTER_TOOLS = "all"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[agents.prism-oracle]
description = "Audit a Figma UI against the design system, enumerate the design-system components/tokens that should be used, and flag compliance issues."
config_file = "agents/design-system-auditor.toml"
nickname_candidates = ["prism-oracle", "token-seer"]

[agents.pattern-weaver]
description = "Review classes and logic to determine whether the chosen software design pattern is correct, justified, or overengineered."
config_file = "agents/pattern-checker.toml"
nickname_candidates = ["pattern-weaver", "logic-weaver"]

[agents.lorekeeper]
description = "Update context.md or CONTEXT.md files for staged and unstaged changes by listing the changed files and clarifying each file's responsibility."
config_file = "agents/lorekeeper.toml"
nickname_candidates = ["lorekeeper", "context-scribe"]

[projects."/Users/nileshteji/Developer/nileshteji.dev"]
trust_level = "trusted"

[projects."/Users/nileshteji/dot-files"]
trust_level = "trusted"

[projects."/Users/nileshteji/Developer/leapscholar-chatgpt-app"]
trust_level = "trusted"

[projects."/Users/nileshteji/Developer/asset-audit-tool"]
trust_level = "trusted"

[projects."/Users/nileshteji"]
trust_level = "trusted"

[projects."/Users/nileshteji/Developer/leapscholar-ios"]
trust_level = "trusted"

[projects."/Users/nileshteji/Developer/leapscholar-android"]
trust_level = "trusted"

[projects."/Users/nileshteji/.codex"]
trust_level = "trusted"

[projects."/Users/nileshteji/Developer/musical-waddle"]
